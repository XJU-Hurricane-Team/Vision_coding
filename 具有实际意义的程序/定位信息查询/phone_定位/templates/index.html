<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS 纯数据输出</title>
    <style>
        /* 极简的终端数据流风格 */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121212;
            color: #00ff00;
            padding: 20px;
            margin: 0;
            font-size: 18px;
            line-height: 1.6;
        }
        .data-block {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #333;
        }
        .label { color: #888; display: inline-block; width: 60px;}
    </style>
</head>
<body>
    <h3 style="color: #fff; border-bottom: 2px solid #555; padding-bottom: 10px;">📍 GPS 数据流 (2秒/次)</h3>
    <div id="log">等待获取定位权限...</div>

    <script>
        let isRequesting = false;

        window.onload = function() {
            if (navigator.geolocation) {
                // 页面加载后立即执行第一次
                getLocation();
                // setInterval 设置为 2000 毫秒，即严格每 2 秒触发一次
                setInterval(getLocation, 2000);
            } else {
                document.getElementById("log").innerText = "错误：浏览器不支持定位。";
            }
        };

        function getLocation() {
            // 如果上一次请求还没返回，直接跳过本次，防止网络延迟导致请求堆积卡死
            if (isRequesting) return;
            isRequesting = true;

            navigator.geolocation.getCurrentPosition(showPosition, showError, {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 0
            });
        }

        function showPosition(position) {
            isRequesting = false; // 释放锁

            const lat = position.coords.latitude.toFixed(6);
            const lon = position.coords.longitude.toFixed(6);
            const accuracy = position.coords.accuracy.toFixed(1);

            // 获取当前时间戳用于显示
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" +
                            now.getMinutes().toString().padStart(2, '0') + ":" +
                            now.getSeconds().toString().padStart(2, '0');

            // 1. 在手机屏幕上纯文本刷新输出
            document.getElementById("log").innerHTML = `
                <div class="data-block">
                    <div><span class="label">时间:</span> ${timeStr}</div>
                    <div><span class="label">纬度:</span> ${lat}</div>
                    <div><span class="label">经度:</span> ${lon}</div>
                    <div><span class="label">精度:</span> ${accuracy} 米</div>
                </div>
            `;

            // 2. 静默发送给电脑端的 Python 后端
            fetch('/api/receive_location', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ latitude: position.coords.latitude, longitude: position.coords.longitude, accuracy: position.coords.accuracy })
            }).catch(e => console.log("后端同步失败", e));
        }

        function showError(error) {
            isRequesting = false; // 报错也要释放锁
            let errorMsg = "";
            switch(error.code) {
                case error.PERMISSION_DENIED: errorMsg = "权限被拒绝"; break;
                case error.POSITION_UNAVAILABLE: errorMsg = "信号不可用"; break;
                case error.TIMEOUT: errorMsg = "获取超时"; break;
            }
            // 将错误信息显示在屏幕上
            document.getElementById("log").innerHTML = `<div style="color: red;">[${new Date().toLocaleTimeString()}] 获取失败: ${errorMsg}</div>`;
        }
    </script>
</body>
</html>
