<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高德静态地图生成器</title>
    <style>
        /* 全局样式与字体 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            /* 页面渐变背景 */
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 主容器：毛玻璃卡片效果 */
        .app-container {
            display: flex;
            flex-direction: row;
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 1200px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* 左侧控制面板 */
        .sidebar {
            width: 350px;
            padding: 40px 30px;
            background: #ffffff;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
        }

        .sidebar h2 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        /* 输入框美化 */
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5ee;
            border-radius: 10px;
            font-size: 15px;
            color: #333;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #8ec5fc;
            box-shadow: 0 0 0 3px rgba(142, 197, 252, 0.2);
        }

        /* 滑动条美化 */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: #e1e5ee;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #8ec5fc;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .zoom-value {
            font-weight: 600;
            color: #8ec5fc;
            font-size: 18px;
            min-width: 25px;
            text-align: right;
        }

        /* 按钮美化 */
        button {
            margin-top: auto;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #8ec5fc 0%, #e0c3fc 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(142, 197, 252, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(142, 197, 252, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        /* 右侧地图展示区 */
        .main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fafbfc;
        }

        .map-container {
            width: 100%;
            height: 100%;
            min-height: 500px;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px dashed #e1e5ee;
            color: #a0aabf;
            font-size: 16px;
            transition: all 0.3s ease;
            position: relative;
        }

        .map-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* 初始隐藏，加载成功后显示 */
        }

        /* 加载动画 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #8ec5fc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .placeholder-text {
            display: block;
        }

    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <h2>Static Map API</h2>

            <div class="input-group">
                <label>经度 (Longitude)</label>
                <input type="text" id="lon" value="87.734871" placeholder="例如: 87.734871">
            </div>

            <div class="input-group">
                <label>纬度 (Latitude)</label>
                <input type="text" id="lat" value="43.851913" placeholder="例如: 43.851913">
            </div>

            <div class="input-group">
                <label>地图缩放级别 (Zoom: 1-17)</label>
                <div class="slider-container">
                    <input type="range" id="zoomSlider" min="1" max="17" value="15" oninput="updateZoomValue(this.value)">
                    <span class="zoom-value" id="zoomValue">15</span>
                </div>
            </div>

            <button onclick="getStaticMap()">生成地图</button>
        </div>

        <div class="main-content">
            <div class="map-container" id="mapContainer">
                <span class="placeholder-text" id="placeholderText">点击左侧按钮生成地图</span>
                <div class="loader" id="loader"></div>
                <img id="mapImage" src="" alt="高德静态地图">
            </div>
        </div>
    </div>

    <script>
        // 填入你的 Web 服务 Key
        const WEB_SERVICE_KEY = "3b56e23a509f36ab6770e5a420efa95b";

        function updateZoomValue(val) {
            document.getElementById('zoomValue').innerText = val;
        }

        function getStaticMap() {
            const lon = document.getElementById('lon').value.trim();
            const lat = document.getElementById('lat').value.trim();
            const zoom = document.getElementById('zoomSlider').value;

            const mapContainer = document.getElementById('mapContainer');
            const placeholderText = document.getElementById('placeholderText');
            const loader = document.getElementById('loader');
            const mapImage = document.getElementById('mapImage');

            if (!lon || !lat) {
                alert("请填写完整的经纬度！");
                return;
            }

            const location = `${lon},${lat}`;

            // 拼凑高德静态地图 API 的 URL，这里把请求尺寸改大了一些以适配右侧宽屏
            const mapUrl = `https://restapi.amap.com/v3/staticmap?key=${WEB_SERVICE_KEY}&location=${location}&zoom=${zoom}&size=1024*768&markers=large,0x8ec5fc,A:${location}`;

            // UI 切换到加载状态
            mapContainer.style.border = "none";
            placeholderText.style.display = "none";
            mapImage.style.display = "none";
            loader.style.display = "block";

            // 创建一个新的图片对象用于预加载
            const imgPreload = new Image();

            imgPreload.onload = function() {
                // 加载成功：隐藏 Loading，显示图片
                loader.style.display = "none";
                mapImage.src = mapUrl;
                mapImage.style.display = "block";
            };

            imgPreload.onerror = function() {
                // 加载失败：恢复初始状态并提示
                loader.style.display = "none";
                placeholderText.style.display = "block";
                placeholderText.innerText = "地图加载失败，请检查网络或坐标";
                mapContainer.style.border = "2px dashed #ff6b6b";
            };

            // 发起请求
            imgPreload.src = mapUrl;
        }
    </script>

</body>
</html>
