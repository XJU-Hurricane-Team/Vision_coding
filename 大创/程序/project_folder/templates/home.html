<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>道路损伤智能识别系统 - 首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-pattern {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-gray-950 text-white h-screen flex flex-col font-sans bg-pattern">

    <main class="flex-1 flex flex-col items-center justify-center p-6 text-center z-10">
        <div class="mb-12">
            <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-400">
                道路损伤智能识别系统
            </h1>
            <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto">
                基于机器视觉与空间定位技术的实时路面健康监测平台
            </p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 max-w-4xl w-full">
            <a href="/detection" class="group relative bg-gray-900 border border-gray-800 rounded-2xl p-8 hover:border-blue-500 transition-all duration-300 hover:shadow-[0_0_30px_rgba(59,130,246,0.2)] overflow-hidden flex flex-col items-center text-center">
                <div class="absolute inset-0 bg-gradient-to-br from-blue-600/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="w-20 h-20 bg-blue-500/20 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <span class="text-4xl">📷</span>
                </div>
                <h2 class="text-2xl font-bold mb-3 text-gray-100">实时损伤识别</h2>
                <p class="text-gray-400 text-sm">启动摄像头，结合机器视觉模型进行实时路面裂缝追踪，并同步在系统地图上绘制损伤分布情况。</p>
            </a>

            <a href="/severe" class="group relative bg-gray-900 border border-gray-800 rounded-2xl p-8 hover:border-red-500 transition-all duration-300 hover:shadow-[0_0_30px_rgba(239,68,68,0.2)] overflow-hidden flex flex-col items-center text-center">
                <div class="absolute inset-0 bg-gradient-to-br from-red-600/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="w-20 h-20 bg-red-500/20 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <span class="text-4xl">🚨</span>
                </div>
                <h2 class="text-2xl font-bold mb-3 text-gray-100">严重损伤溯源</h2>
                <p class="text-gray-400 text-sm">查看系统自动捕获的严重损伤图像，并支持通过经纬度坐标快速生成现场位置的定位地图。</p>
            </a>
        </div>
    </main>
</body>
</html>
