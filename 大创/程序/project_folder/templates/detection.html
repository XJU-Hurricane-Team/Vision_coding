<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时监控 - 道路损伤识别系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel { background: rgba(31, 41, 55, 0.8); backdrop-filter: blur(10px); }
        .glass-legend { background: rgba(17, 24, 39, 0.75); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col overflow-hidden font-sans">

    <header class="glass-panel border-b border-gray-800 px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-4">
            <a href="/" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2 border border-gray-700 hover:bg-gray-800 px-3 py-1.5 rounded-lg text-sm">
                <span>←</span> 返回主页
            </a>
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse ml-2"></div>
            <h1 class="text-xl font-bold tracking-wider text-white">道路损伤实时监控</h1>
        </div>
        <div class="text-sm text-gray-400">系统状态: <span class="text-green-400 font-semibold">运行中</span></div>
    </header>

    <main class="flex-1 p-4 flex flex-col lg:flex-row gap-4 h-full">
        <section class="flex-1 flex flex-col bg-gray-900 border border-gray-800 rounded-xl shadow-2xl overflow-hidden">
            <div class="px-4 py-3 bg-gray-800/50 border-b border-gray-800 flex justify-between items-center z-10">
                <h2 class="font-semibold text-gray-200 flex items-center gap-2">🎥 摄像头实时分析视图</h2>
                <span class="text-xs bg-blue-500/20 text-blue-400 px-2 py-1 rounded border border-blue-500/30">Tracking Active</span>
            </div>
            <div class="flex-1 bg-black flex items-center justify-center relative overflow-hidden">
                <img src="/video_feed" alt="Video Stream" class="object-contain w-full h-full max-h-[85vh]">
            </div>
        </section>

        <section class="flex-1 flex flex-col bg-gray-900 border border-gray-800 rounded-xl shadow-2xl overflow-hidden relative">
            <div class="px-4 py-3 bg-gray-800/50 border-b border-gray-800 flex justify-between items-center z-10">
                <h2 class="font-semibold text-gray-200">🗺️ 实时空间定位图</h2>
                <span class="text-xs bg-green-500/20 text-green-400 px-2 py-1 rounded border border-green-500/30">Map Service</span>
            </div>
            <div class="flex-1 bg-black flex items-center justify-center relative overflow-hidden">
                <img src="/map_feed" alt="Map Stream" class="object-contain w-full h-full max-h-[85vh]">
                <div class="absolute bottom-6 left-6 glass-legend border border-gray-700 p-4 rounded-lg shadow-xl">
                    <h3 class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">损伤严重程度图例</h3>
                    <div class="flex flex-col gap-3">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full bg-yellow-400 border border-black shadow-[0_0_5px_rgba(250,204,21,0.5)]"></div>
                            <span class="text-sm text-gray-200">轻度损伤 (1-2条)</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-4 rounded-full bg-orange-500 border border-black shadow-[0_0_5px_rgba(249,115,22,0.5)]"></div>
                            <span class="text-sm text-gray-200">中度损伤 (3-5条)</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-5 h-5 rounded-full bg-red-600 border border-black shadow-[0_0_8px_rgba(220,38,38,0.6)]"></div>
                            <span class="text-sm text-gray-200">严重损伤 (≥6条)</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
