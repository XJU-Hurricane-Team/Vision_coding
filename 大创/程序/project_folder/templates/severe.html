<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>损伤溯源 - 道路损伤识别系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex justify-between items-center shadow-md shrink-0">
        <div class="flex items-center gap-4">
            <a href="/" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2 border border-gray-700 hover:bg-gray-800 px-3 py-1.5 rounded-lg text-sm">
                <span>←</span> 返回主页
            </a>
            <h1 class="text-xl font-bold text-red-400 flex items-center gap-2">🚨 严重损伤预警记录</h1>
        </div>
    </header>

    <main class="flex-1 p-6 flex flex-col lg:flex-row gap-6 overflow-hidden">

        <section class="flex-1 lg:w-1/2 flex flex-col bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-xl">
            <div class="px-5 py-4 border-b border-gray-800 bg-gray-800/30">
                <h2 class="font-semibold text-lg text-gray-200">系统捕获的损伤画面</h2>
                <p class="text-xs text-gray-400 mt-1">点击“定位坐标”在右侧生成定位地图；点击“查看大图”在新窗口查看高清原图。</p>
            </div>
            <div class="flex-1 p-4 overflow-y-auto" id="records-container">
                <div class="text-center text-gray-500 mt-10" id="loading-msg">正在加载记录...</div>
            </div>
        </section>

        <section class="flex-1 lg:w-1/2 flex flex-col gap-6">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-xl shrink-0">
                <h2 class="font-semibold text-lg text-gray-200 mb-4 flex items-center gap-2">📍 现场位置定位图</h2>
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1">
                        <label class="block text-xs text-gray-400 mb-1">经度 (Longitude)</label>
                        <input type="text" id="input-lon" placeholder="请输入经度坐标" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="flex-1">
                        <label class="block text-xs text-gray-400 mb-1">纬度 (Latitude)</label>
                        <input type="text" id="input-lat" placeholder="请输入纬度坐标" class="w-full bg-gray-950 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div class="flex items-end">
                        <button onclick="fetchMap()" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded transition-colors font-medium">生成定位地图</button>
                    </div>
                </div>
            </div>

            <div class="flex-1 bg-gray-900 border border-gray-800 rounded-xl overflow-hidden shadow-xl relative flex items-center justify-center">
                <div id="map-placeholder" class="text-gray-600 text-sm flex flex-col items-center gap-2">
                    <span class="text-4xl">🗺️</span>
                    <span>等待输入坐标以生成地图</span>
                </div>
                <img id="static-map-result" class="hidden w-full h-full object-cover" alt="Location Map">
            </div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/records')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('records-container');
                    const loading = document.getElementById('loading-msg');

                    if (data.length === 0) {
                        loading.innerText = "暂无严重损伤记录。";
                        return;
                    }

                    loading.style.display = 'none';
                    data.forEach(item => {
                        let timeStr = item.time;
                        if(timeStr.length >= 15) {
                            timeStr = `${timeStr.slice(0,4)}/${timeStr.slice(4,6)}/${timeStr.slice(6,8)} ${timeStr.slice(9,11)}:${timeStr.slice(11,13)}:${timeStr.slice(13,15)}`;
                        }

                        const card = document.createElement('div');
                        card.className = "bg-gray-950 border border-gray-800 rounded-lg overflow-hidden mb-4 shadow-md";
                        card.innerHTML = `
                            <img src="/images/${item.filename}" class="w-full h-48 object-cover border-b border-gray-800" alt="Severe Crack">
                            <div class="p-3 flex justify-between items-center bg-gray-900">
                                <div>
                                    <p class="text-sm text-gray-200">📍 [${item.lon}, ${item.lat}]</p>
                                    <p class="text-xs text-gray-500 mt-1">🕒 ${timeStr}</p>
                                </div>
                                <div class="flex gap-2">
                                    <a href="/images/${item.filename}" target="_blank" class="text-xs bg-teal-900/50 hover:bg-teal-800 text-teal-200 px-3 py-1.5 rounded transition-colors border border-teal-700/50 flex items-center">
                                        🔍 查看大图
                                    </a>
                                    <button onclick="fillCoordinates('${item.lon}', '${item.lat}')" class="text-xs bg-blue-900/50 hover:bg-blue-800 text-blue-200 px-3 py-1.5 rounded transition-colors border border-blue-700/50 flex items-center">
                                        📍 定位坐标
                                    </button>
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(err => console.error("加载记录失败:", err));
        });

        function fillCoordinates(lon, lat) {
            document.getElementById('input-lon').value = lon;
            document.getElementById('input-lat').value = lat;
            fetchMap();
        }

        function fetchMap() {
            const lon = document.getElementById('input-lon').value;
            const lat = document.getElementById('input-lat').value;

            if (!lon || !lat) {
                alert("请先填写需要定位的经度和纬度。");
                return;
            }

            const mapImg = document.getElementById('static-map-result');
            const placeholder = document.getElementById('map-placeholder');

            const imageUrl = `/api/fetch_map?lon=${lon}&lat=${lat}&t=${new Date().getTime()}`;

            mapImg.src = imageUrl;

            mapImg.onload = () => {
                placeholder.classList.add('hidden');
                mapImg.classList.remove('hidden');
            };
            mapImg.onerror = () => {
                alert("定位地图加载失败，请检查网络或坐标格式。");
            }
        }
    </script>
</body>
</html>
